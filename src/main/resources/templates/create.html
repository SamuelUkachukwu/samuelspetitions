<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Create Petition</title>
</head>

<body>
<div class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-body-tertiary bg-custom">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">SamuelsPetition</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/create}">Create Petition</a>
                    </li>
                </ul>
                <form th:action="@{/search}" method="get" class="d-flex" role="search">
                    <input name="query" class="form-control me-2" type="search" placeholder="Search" required>
                    <button class="btn btn-primary" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <main class="py-5 flex-grow-1">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8">
                    <div class="card shadow">
                        <div class="card-body">
                            <h3 class="card-title mb-4 text-center">Create a Petition</h3>
                            <form method="post" th:object="${petition}" th:action="@{/create-petition}">
                                <div class="mb-3">
                                    <label for="title" class="form-label">Title</label>
                                    <input type="text" class="form-control" id="title" th:field="*{title}"
                                           placeholder="Enter petition title">

                                    <div class="text-danger fst-italic small" th:if="${#fields.hasErrors('title')}"
                                         th:errors="*{title}">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">Short Description</label>
                                    <input type="text" class="form-control" id="description"
                                           th:field="*{description}" placeholder="Enter short description">

                                    <div class="text-danger fst-italic small"
                                         th:if="${#fields.hasErrors('description')}" th:errors="*{description}">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="firstName" class="form-label">Petitioner First Name</label>
                                    <input type="text" class="form-control" id="firstName"
                                           th:field="*{petitionerFirstName}" placeholder="Enter first name">

                                    <div class="text-danger fst-italic small"
                                         th:if="${#fields.hasErrors('petitionerFirstName')}"
                                         th:errors="*{petitionerFirstName}">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="lastName" class="form-label">Petitioner Last Name</label>
                                    <input type="text" class="form-control" id="lastName"
                                           th:field="*{petitionerLastName}" placeholder="Enter last name">

                                    <div class="text-danger fst-italic small"
                                         th:if="${#fields.hasErrors('petitionerLastName')}"
                                         th:errors="*{petitionerLastName}">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="body" class="form-label">Petition Body</label>
                                    <textarea class="form-control" id="body" rows="5" th:field="*{petitionBody}"
                                              placeholder="Enter full petition text"></textarea>

                                    <div class="text-danger fst-italic small"
                                         th:if="${#fields.hasErrors('petitionBody')}" th:errors="*{petitionBody}">
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">Create Petition</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="mt-auto bg-light py-3 bg-custom">
        <div class="container text-center">
                <span class="fs-6">copyright &#169; <span class="logo1">Samuelspetitions</span>
                    &reg; <span id="copy-right"></span></span>
        </div>
    </footer>
</div>
<script>
    document.getElementById("copy-right").innerHTML = new Date().getFullYear();
</script>
</body>

</html>
