<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Home</title>
</head>

<body>
<div class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-body-tertiary bg-custom">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">SamuelsPetition</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/create}">Create Petition</a>
                    </li>
                </ul>
                <form th:action="@{/search}" method="get" class="d-flex" role="search">
                    <input name="query" class="form-control me-2" type="search" placeholder="Search" required>
                    <button class="btn btn-primary" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        <h1 class="mb-4 text-center pt-5 fw-bold">Petitions</h1>
        <div class="container">
            <div class="row g-4 mb-3">
                <div th:each="petition : ${petitions}" class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <a th:href="@{/detail/{id}(id=${petition.id})}" class="text-decoration-none text-dark">
                        <div class="card h-100">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title fw-bold" th:text="${petition.title}"></h5>
                                <p class="card-text" th:text="${petition.description}"></p>
                                <div class="mt-auto fw-semibold small">
                                    <span th:text="${petition.petitionerFirstName}"></span>&nbsp;<span th:text="${petition.petitionerLastName}"></span><br>
                                    <span class="fw-light small" th:text="${petition.petitionDate}"></span>
                                </div>
                                <p class="text-end mb-0 small fw-semibold" >No of Signatures: <span class="text-primary" th:text="${petition.signatures.size()}"></span></p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer class="mt-auto bg-light py-3 bg-custom">
        <div class="container text-center">
                <span class="fs-6">copyright &#169; <span class="logo">Samuelspetitions</span>
                    &reg; <span id="copy-right"></span></span>
        </div>
    </footer>
</div>
<script>
    document.getElementById("copy-right").innerHTML = new Date().getFullYear();
</script>
</body>

</html>
