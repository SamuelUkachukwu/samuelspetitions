<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <title>Home</title>
</head>

<body>
<div class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">SamuelsPetition</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/create-petition}">Create Petition</a>
                    </li>
                </ul>
                <form href="results.html" class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        <h1 class="mb-4 text-center pt-5">Petitions</h1>
        <div class="container">
            <div class="row g-4">
                <div th:each="petition : ${petitions}" class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <a th:href="@{/detail/{id}(id=${petition.id})}" class="text-decoration-none text-dark">
                        <div class="card h-100">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title" th:text="${petition.title}"></h5>
                                <p class="card-text" th:text="${petition.description}"></p>
<!--                                <p class="card-text flex-grow-1" th:text="${petition.petitionBody}"></p>-->
                                <div class="mt-auto text-muted small">
                                    <span th:text="${petition.petitionerFirstName}"></span><br>
                                    <span th:text="${petition.petitionDate}"></span>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer class="mt-auto bg-light py-3 ">
        <div class="container text-center">
                <span class="fs-6">copyright &#169; <span class="logo1">Samuelspetitions</span>
                    &reg; <span id="copy-right"></span></span>
        </div>
    </footer>
</div>
<script>
    document.getElementById("copy-right").innerHTML = new Date().getFullYear();
</script>
</body>

</html>
