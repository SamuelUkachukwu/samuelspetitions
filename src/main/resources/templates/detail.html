<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Petition Detail</title>
</head>

<body>
<div class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-body-tertiary bg-custom">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">SamuelsPetition</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/create}">Create Petition</a>
                    </li>
                </ul>
                <form th:action="@{/search}" method="get" class="d-flex" role="search">
                    <input name="query" class="form-control me-2" type="search" placeholder="Search" required>
                    <button class="btn btn-primary" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="py-5 flex-grow-1">
        <div class="container">
            <div class="row justify-content-center">

                <!-- Petition Detail Card -->
                <div class="col-12 col-md-8 ">
                    <div class="card p-md-4">
                        <div class="card-body d-flex flex-column">
                            <h3 class="card-title text-center mb-3" th:text="${petition.title}"></h3>
                            <p class="card-text card-subtitle mb-3"><strong>Description:</strong> <span
                                    th:text="${petition.description}"></span></p>
                            <p class="card-text mb-3"><strong>Body:</strong> <span
                                    th:text="${petition.petitionBody}"></span></p>
                            <div class="mt-auto fw-semibold small mb-3">
                                <span th:text="${petition.petitionerFirstName}"></span>&nbsp;<span th:text="${petition.petitionerLastName}"></span><br>
                                <span class="fw-light small" th:text="${petition.petitionDate}"></span>
                            </div>

                            <div th:if="${petition.signatures.size() > 0}">
                                <a class="btn btn-primary mb-3 w-100" data-bs-toggle="collapse"
                                   th:href="'#collapse-' + ${petition.id}" role="button" aria-expanded="false"
                                   th:aria-controls="'collapse-' + ${petition.id}">
                                    View Signatures
                                </a>

                                <div class="collapse" th:id="'collapse-' + ${petition.id}">
                                    <div class="card card-body p-2">
                                        <ul class="mb-0">
                                            <li th:each="sig : ${petition.signatures}">
                                                <span th:text="${sig.signerFirstName} + ' ' + ${sig.signerLastName}"></span>
                                                (<span th:text="${sig.signerEmail}"></span>)
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                            <p class="text-bold text-center" th:unless="${petition.signatures.size() > 0}">
                                No one has signed yet.
                            </p>

                            <hr>
                            <h5 class="mb-4 mt-3">Sign this petition</h5>

                            <!-- Sign the petition form -->
                            <form class="row g-3" method="post" th:object="${signature}"
                                  th:action="@{/petition/{id}(id=${petition.id})}">

                                <div class="mb-3 col-lg-6">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName"
                                           th:field="*{signerFirstName}" placeholder="Enter first name" required>
                                </div>
                                <div class="mb-3 col-lg-6">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName"
                                           th:field="*{signerLastName}" placeholder="Enter last name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" th:field="*{signerEmail}"
                                           placeholder="Enter email" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Sign Petition</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="mt-auto bg-light py-3 bg-custom">
        <div class="container text-center">
                <span class="fs-6">copyright &#169; <span class="logo1">Samuelspetitions</span>
                    &reg; <span id="copy-right"></span></span>
        </div>
    </footer>
</div>
<script>
    document.getElementById("copy-right").innerHTML = new Date().getFullYear();
</script>
</body>

</html>
