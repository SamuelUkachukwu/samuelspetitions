<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Search Results</title>
</head>

<body>
<div class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-body-tertiary bg-custom">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">SamuelsPetition</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/create}">Create Petition</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="py-5 flex-grow-1">
        <div class="container">

            <div class="row mb-4">
                <div class="col-12">
                    <form th:action="@{/search}" method="get" class="d-flex" role="search">
                        <input name="query" class="form-control me-2" type="search" placeholder="Search" required>
                        <button class="btn btn-primary" type="submit">Search</button>
                    </form>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-12" th:if="${#lists.isEmpty(petitions)}">
                    <div class="alert alert-warning text-center" role="alert">
                        Search not found
                    </div>
                </div>

                <div class="col-12" th:each="petition : ${petitions}" th:unless="${#lists.isEmpty(petitions)}">
                    <a th:href="@{/detail/{id}(id=${petition.id})}" class="">
                        <div class="card shadow">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${petition.title}"></h5>
                                <p class="card-text" th:text="${petition.description}"></p>
                                <p class="text-muted mb-0">
                                    By
                                    <span th:text="${petition.petitionerFirstName}"></span>
                                    <span th:text="${petition.petitionerLastName}"></span>
                                </p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer class="mt-auto bg-light py-3 bg-custom">
        <div class="container text-center">
                <span class="fs-6">copyright &#169; <span class="logo1">Samuelspetitions</span>
                    &reg; <span id="copy-right"></span></span>
        </div>
    </footer>
</div>
<script>
    document.getElementById("copy-right").innerHTML = new Date().getFullYear();
</script>
</body>

</html>
