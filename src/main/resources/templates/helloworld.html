<!doctype html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Test page</title>
</head>
<body>
<h1 class="text-3xl font-bold mb-6">All Petitions</h1>

<div class="space-y-4" th:each="petition : ${petitions}">
    <div class="bg-white p-4 rounded-xl shadow">
        <h2 class="text-xl font-semibold" th:text="${petition.title}"></h2>
        <p class="text-gray-600" th:text="${petition.description}"></p>
        <p class="text-gray-600" th:text="${petition.description}"></p>

    </div>
</div>
</body>
</html>
